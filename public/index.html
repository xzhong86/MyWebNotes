<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Secure Notes</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="card" id="unlock-card">
        <h1>Simple Secure Notes</h1>
        <p class="muted">BruceZ的简易Web云便签。</p>
        <p>输入用户密钥后解锁，或联系管理员添加用户。</p>
        <label for="access-key">访问密钥</label>
        <input id="access-key" type="password" placeholder="请输入访问密钥" autocomplete="off" />
        <div class="unlock-footer">
          <p id="unlock-status" class="status"></p>
          <button id="unlock-btn" type="button">解锁</button>
        </div>
      </section>

      <section class="card hidden" id="note-card">
        <div class="topbar">
          <div>
            <h2>我的便签</h2>
            <p class="identity">当前用户：<strong id="current-user">-</strong></p>
          </div>
          <div class="top-actions">
            <button id="create-note-btn" type="button">新增</button>
            <button id="refresh-btn" type="button">刷新</button>
            <button id="lock-btn" type="button">锁定</button>
          </div>
        </div>
        <p id="note-status" class="status"></p>
        <div id="notes-stream" class="notes-stream"></div>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
